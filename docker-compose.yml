version: "3.8"

services:

  # ─── Vector Database ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + Web UI → http://localhost:6333/dashboard
      - "6334:6334"   # gRPC (optional)
    volumes:
      - qdrant_storage:/qdrant/storage

  # ─── Embedding Model (Ollama) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"  # REST API → http://localhost:11434
    volumes:
      - ollama_models:/root/.ollama   # models cached here (persists between restarts)
    # CPU-only: no GPU flags needed

  # ─── Auto-pull embedding model on first start ──────────────────
  ollama-init:
    image: curlimages/curl:latest
    container_name: ollama-init
    depends_on:
      - ollama
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama to be ready...';
        sleep 8;
        curl -s http://ollama:11434/api/pull -d '{\"name\":\"nomic-embed-text\"}';
        echo 'Model pulled successfully!'
      "

volumes:
  qdrant_storage:
    driver: local
  ollama_models:
    driver: local